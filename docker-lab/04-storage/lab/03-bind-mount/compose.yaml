services:
  web:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      # Bind mount: директория хоста монтируется в контейнер.
      # :ro — контейнер не может изменить файлы.
      # Любое изменение файла на хосте сразу видно в контейнере.
      - ./site:/usr/share/nginx/html:ro

services:
  oom:
    image: alpine:3.20
    container_name: dbg-oom
    # mem_limit + memswap_limit одинаковые → swap отключён для контейнера.
    # Без memswap_limit процесс может уйти в swap и OOM не сработает.
    mem_limit: 8m
    memswap_limit: 8m
    # /dev/shm — это tmpfs (RAM-backed), запись туда гарантированно
    # попадает в счётчик памяти cgroup. dd пишет 30 МБ → лимит 8 МБ → SIGKILL.
    # Симптом: ExitCode=137, OOMKilled=true.
    command: ["sh", "-c", "echo 'writing to /dev/shm...' && dd if=/dev/zero of=/dev/shm/fill bs=1M count=30 status=progress && echo done"]

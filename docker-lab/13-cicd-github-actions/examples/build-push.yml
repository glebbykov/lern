# ─────────────────────────────────────────────────────────────────
# Шаблон: Build → Test → Scan → Push to GHCR
#
# Скопируй в .github/workflows/build-push.yml своего проекта.
# Замени BUILD_CONTEXT на путь к папке с Dockerfile.
# Замени APP_PORT на порт, который слушает твоё приложение.
# ─────────────────────────────────────────────────────────────────
name: Build and Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  # ghcr.io/<owner>/<image-name>
  IMAGE: ghcr.io/${{ github.repository_owner }}/my-app
  BUILD_CONTEXT: .          # путь до Dockerfile
  APP_PORT: 8080            # порт healthz внутри контейнера

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ env.BUILD_CONTEXT }}/Dockerfile
          failure-threshold: warning   # warning не ломает pipeline

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # load: true — загружает образ в локальный docker daemon (не пушит)
      # нужно для smoke-теста в следующем шаге
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          load: true
          tags: ${{ env.IMAGE }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          docker run -d --name smoke -p ${{ env.APP_PORT }}:${{ env.APP_PORT }} ${{ env.IMAGE }}:test
          sleep 2
          curl --fail --retry 3 --retry-delay 1 http://localhost:${{ env.APP_PORT }}/healthz
          docker rm -f smoke

  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          load: true
          tags: ${{ env.IMAGE }}:scan
          cache-from: type=gha

      # exit-code: 1 — pipeline упадёт при HIGH/CRITICAL CVE
      # ignore-unfixed: true — игнорировать CVE без патча
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:scan
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: [build-test, scan]
    # Не пушим для pull request — только для коммитов в main и тегов
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write   # обязательно для ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # встроен, не нужно добавлять

      # Генерирует теги автоматически:
      #   git tag v1.3.0  →  1.3.0, 1.3
      #   push в main     →  latest, sha-abc1234
      #   PR              →  sha-abc1234 (без latest)
      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

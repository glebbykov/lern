# Pre-deploy DB migration: миграция перед обновлением приложения
#
# Паттерн:
#   1. Запуск migrator-контейнера (применяет миграции)
#   2. Только после успеха — запуск/обновление app
#
# Использование:
#   docker compose -f lab/db-migration/compose.yaml up -d
#   # Проверить что миграции прошли:
#   docker compose -f lab/db-migration/compose.yaml logs migrator
#   # Проверить app:
#   curl http://localhost:8093

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 3s
      retries: 10

  # Migrator: запускается первым, применяет миграции, завершается
  migrator:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: appuser
      PGPASSWORD: apppass
      PGDATABASE: appdb
    volumes:
      - ./migrations:/migrations:ro
    command: >
      sh -c "
        echo 'Running migrations...' &&
        for f in /migrations/*.sql; do
          echo \"Applying: $$f\" &&
          psql -f $$f || exit 1
        done &&
        echo 'All migrations applied successfully'
      "
    restart: "no"

  # App: стартует только после успешной миграции
  app:
    image: hashicorp/http-echo:1.0.0
    command: ["-text=app v2 (migrated)", "-listen=:5678"]
    ports:
      - "8093:5678"
    depends_on:
      migrator:
        condition: service_completed_successfully
      db:
        condition: service_healthy

volumes:
  pg_data:

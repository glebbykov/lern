# Canary deployment: nginx weight-based routing
#
# 90% трафика → stable, 10% → canary
# Постепенно увеличиваем weight canary при успехе
#
# Использование:
#   docker compose -f lab/canary/compose.yaml up -d
#   for i in $(seq 1 20); do curl -s http://localhost:8091; done
#   → ~18 ответов "stable", ~2 ответа "canary"

services:
  stable:
    image: hashicorp/http-echo:1.0.0
    command: ["-text=stable-v1", "-listen=:5678"]

  canary:
    image: hashicorp/http-echo:1.0.0
    command: ["-text=canary-v2", "-listen=:5678"]

  proxy:
    image: nginx:1.27-alpine
    ports:
      - "8091:80"
    volumes:
      - ./nginx-canary.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - stable
      - canary

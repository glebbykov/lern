# Canary: weight-based routing
# 90% → stable, 10% → canary

upstream backend {
    server stable:5678 weight=9;     # 90% трафика
    server canary:5678 weight=1;     # 10% трафика
}

server {
    listen 80;

    location / {
        proxy_pass http://backend;
        proxy_set_header X-Real-IP $remote_addr;

        # Для наблюдения: добавляем заголовок с именем upstream-сервера
        add_header X-Upstream $upstream_addr always;
    }
}

apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
# Для доступа снаружи кластера (аналог ports: "8080:8080")
apiVersion: v1
kind: Service
metadata:
  name: api-external
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
  type: NodePort

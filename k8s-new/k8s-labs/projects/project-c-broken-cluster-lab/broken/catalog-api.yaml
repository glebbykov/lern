apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
  namespace: lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-api
  template:
    metadata:
      labels:
        app: catalog-api
    spec:
      containers:
      - name: app
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /wrong
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5

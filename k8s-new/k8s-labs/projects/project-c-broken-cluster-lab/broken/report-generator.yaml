apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-generator
  namespace: lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: report-generator
  template:
    metadata:
      labels:
        app: report-generator
    spec:
      containers:
      - name: app
        image: python:3.11-alpine
        command:
        - sh
        - -c
        - |
          python - <<'PY'
          x = 'a' * (300 * 1024 * 1024)
          import time
          time.sleep(600)
          PY
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 64Mi

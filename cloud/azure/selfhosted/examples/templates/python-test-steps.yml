# =============================================================================
# Step template: Python тесты + публикация результатов
# =============================================================================
#
# Это **step template** — переиспользуемый набор шагов, который подключается из
# основного пайплайна через `- template: ...`. См. лабу 04 для теории.
#
# ПОДКЛЮЧЕНИЕ из основного пайплайна:
#   steps:
#     - template: templates/python-test-steps.yml
#       parameters:
#         testsPath: 'tests/'
#         pythonVersion: '3.12'         # переопределение (опционально)
#
# КОГДА template раскрывается:
#   На этапе **компиляции** YAML, ДО старта билда. То есть `${{ parameters.X }}`
#   подставляются перед тем, как билд получает план шагов. Это значит:
#     - параметры template НЕ могут содержать runtime-значения вроде $(Build.BuildId)
#     - условия в шагах через ${{ if }} тоже compile-time
#     - в логе агента уже видно конкретные значения, не template-выражения
# =============================================================================


# ─── PARAMETERS ───────────────────────────────────────────────────────────────
# Параметры template-а. Можно переопределять при подключении.
parameters:
  - name: pythonVersion
    type: string
    default: '3.11'           # информационное — для displayName, не для install
                              # (Python ставится один раз на агент через Capabilities)

  - name: testsPath
    type: string
    default: 'tests/'         # папка с pytest-ами относительно sources

  - name: requirementsFile
    type: string
    default: 'requirements.txt'  # путь к файлу с зависимостями


# ─── STEPS ────────────────────────────────────────────────────────────────────
# Эти шаги вставляются в основной пайплайн вместо строки `- template: ...`,
# словно мы написали их inline. Никакого "вызова" — это инлайн через раскрытие.
steps:

  # ─── ШАГ 1: создать venv, поставить зависимости, прогнать тесты ─────────────
  # Один многострочный cmd-скрипт делает всё сразу:
  #   1. python -m venv .venv      — создаёт изолированное venv в рабочей папке агента
  #   2. call activate.bat         — активирует venv (`call` обязателен в cmd, иначе
  #                                  дальнейшие команды не подхватят venv-овый python/pip)
  #   3. pip install -r requirements  — ставит зависимости
  #   4. pytest --junitxml=...     — прогоняет тесты, сохраняет результат в XML
  #
  # `${{ parameters.X }}` подставляются ДО запуска шага, в логе агента
  # (на странице билда) ты увидишь уже подставленные значения.
  - script: |
      python -m venv .venv
      call .venv\Scripts\activate.bat
      pip install -r ${{ parameters.requirementsFile }}
      pytest ${{ parameters.testsPath }} -v --junitxml=test-results.xml
    displayName: 'Install deps and run tests (py ${{ parameters.pythonVersion }})'

  # ─── ШАГ 2: загрузить XML с результатами в Tests-вкладку билда ──────────────
  # Без этого шага pytest зелёный/красный, но во вкладке "Tests" билда пусто.
  # PublishTestResults@2 парсит JUnit-формат и заполняет вкладку — там видно
  # каждый тест отдельно, время выполнения, traceback падающих, тренд за время.
  #
  # condition: succeededOrFailed() — публикуем результаты ДАЖЕ если тесты упали.
  # Без этого условия при провале тестов пайплайн зашейлится раньше шага публикации,
  # и в UI не увидишь, какой именно тест провалился — пришлось бы лезть в raw log.
  - task: PublishTestResults@2
    displayName: 'Publish test results'
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: 'test-results.xml'
    condition: succeededOrFailed()

# =============================================================================
# Антипаттерны, которые НЕ нужно делать в этом template:
#
#   ❌ Не подключать секреты через ${{ }} — они подставляются compile-time
#      (т.е. появляются в логе агента не как ***, а в чистом виде). Используй $() и env:.
#
#   ❌ Не делать ${{ if eq(parameters.X, 'foo') }} с десятью ветками — превращает
#      шаблон в сложный нечитаемый ад. Лучше иметь несколько маленьких template-ов.
#
#   ❌ Не пытаться вернуть что-то "из template" — step template только вставляет
#      шаги, не возвращает значения. Если нужно "общую функцию" — используй
#      output variables через `##vso[task.setvariable variable=name;isOutput=true]value`.
# =============================================================================

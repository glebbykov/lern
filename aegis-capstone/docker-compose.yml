# Phase 1 — FastAPI skeleton'ы для трёх сервисов на az-app.
# Сборка локальных образов из app/<service>/Dockerfile.
# Деплой: rsync + `docker compose up -d --build` (см. docs/runbooks/deploy-services.md).

services:
  ledger-api:
    build: ./app/ledger-api
    image: aegis/ledger-api:0.1.0
    container_name: ledger-api
    restart: unless-stopped
    networks: [aegis-net]
    ports:
      - "8081:80"
    environment:
      - SERVICE_NAME=ledger-api
      - VERSION=0.1.0
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  normalizer:
    build: ./app/normalizer
    image: aegis/normalizer:0.1.0
    container_name: normalizer
    restart: unless-stopped
    networks: [aegis-net]
    ports:
      - "8082:80"
    environment:
      - SERVICE_NAME=normalizer
      - VERSION=0.1.0
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  matcher:
    build: ./app/matcher
    image: aegis/matcher:0.1.0
    container_name: matcher
    restart: unless-stopped
    networks: [aegis-net]
    ports:
      - "8083:80"
    environment:
      - SERVICE_NAME=matcher
      - VERSION=0.1.0
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  aegis-net:
    driver: bridge
    name: aegis-net

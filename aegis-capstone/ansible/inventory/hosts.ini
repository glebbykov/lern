kafka_nodes
etcd_nodes
storage_nodes

[private_nodes:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null -o ProxyCommand="ssh -W %h:%p -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null ansible_user@52.187.237.100"'

[all:vars]
ansible_user=ansible_user
ansible_ssh_private_key_file=~/.ssh/id_ed25519

---
# ---------------------------------------------------------------------------
# Project Aegis: Main Playbook
# ---------------------------------------------------------------------------

# 1. Base Layer: Infrastructure & Connectivity
- name: Common foundation (storage, kernel, mesh, firewall)
  hosts: azure_nodes
  become: yes
  roles:
    - 01-storage              # Disks, RAID, LVM, Mounts
    - 02-kernel               # Sysctl, THP, Kernel Modules
    - 05-overlay-network      # WireGuard Mesh
    - 03-security             # UFW (with WG rule), SSH, Auditd

# 2. Container Runtime: Future K8s
- name: Container runtime (app node only)
  hosts: runtime_hosts
  become: yes
  roles:
    - 04-runtime

# 3. Stateful Layer: DBs, Kafka, etcd, Nginx
- name: Stateful tier (db / kafka / etcd / nginx)
  hosts: stateful:app_nodes
  become: yes
  roles:
    - 06-stateful-tier

# 4. App Sandbox
- name: App sandbox
  hosts: app_nodes
  become: yes
  roles:
    - 05-app-sandbox

# 5. Observability: Last step to ensure targets are up
- name: Observability
  hosts: azure_nodes
  become: yes
  roles:
    - 07-observability

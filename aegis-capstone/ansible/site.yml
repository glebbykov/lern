---
- name: Hardening Bastion Node
  hosts: bastion
  become: yes
  tasks:
    - name: Установка Fail2ban
      apt: name=fail2ban state=present

- name: Setup Application, Kafka & Observability Node
  hosts: app_nodes
  become: yes
  roles:
    - 02-kernel
    - 03-security
    - 04-runtime
    - 06-stateful-tier
    - 07-observability

- name: Setup Database Node (Postgres, Mongo, Redis with I/O isolation)
  hosts: db_nodes
  become: yes
  roles:
    - 01-storage
    - 02-kernel
    - 03-security
    - 06-stateful-tier

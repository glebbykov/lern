---
- name: Установка зависимостей хранилища
  apt:
    name: [lvm2, xfsprogs, mdadm]
    state: present
    update_cache: yes

# --- DB NODE (RAID 1) ---
- name: Создание RAID 1 (etcd, pgsql, redis, mongodb) /dev/sdc, /dev/sdd на db-node
  command: mdadm --create --verbose /dev/md0 --level=1 --raid-devices=2 /dev/sdc /dev/sdd
  args:
    creates: /dev/md0
  when: "'db_nodes' in group_names"

- name: Создание VG vg_db на RAID 1
  lvg:
    vg: vg_db
    pvs: /dev/md0
  when: "'db_nodes' in group_names"

- name: Создание Logical Volumes для DB
  lvol:
    vg: vg_db
    lv: "{{ item.lv }}"
    size: "{{ item.size }}"
  loop:
    - { lv: 'lv_etcd', size: '2G' }
    - { lv: 'lv_redis', size: '2G' }
    - { lv: 'lv_mongo', size: '5G' }
    - { lv: 'lv_pgsql', size: '100%FREE' }
  when: "'db_nodes' in group_names"

- name: Форматирование томов DB в ext4
  filesystem:
    fstype: ext4
    dev: "/dev/vg_db/{{ item }}"
  loop: [lv_etcd, lv_redis, lv_pgsql]
  when: "'db_nodes' in group_names"

- name: Форматирование тома MongoDB в XFS (Best practice for WiredTiger)
  filesystem:
    fstype: xfs
    dev: "/dev/vg_db/lv_mongo"
  when: "'db_nodes' in group_names"

- name: Точки монтирования DB
  file:
    path: "/var/lib/{{ item }}"
    state: directory
  loop: [etcd, redis, postgresql, mongodb]
  when: "'db_nodes' in group_names"

- name: Монтирование DB (ext4)
  mount:
    path: "/var/lib/{{ item.name }}"
    src: "/dev/vg_db/lv_{{ item.name }}"
    fstype: ext4
    state: mounted
  loop:
    - { name: 'etcd' }
    - { name: 'redis' }
    - { name: 'postgresql' }
  when: "'db_nodes' in group_names"

- name: Монтирование MongoDB (xfs)
  mount:
    path: "/var/lib/mongodb"
    src: "/dev/vg_db/lv_mongo"
    fstype: xfs
    state: mounted
  when: "'db_nodes' in group_names"


# --- KAFKA NODE (RAID 5) ---
- name: Создание RAID 5 (kafka) /dev/sdc, /dev/sdd, /dev/sde на kafka-node
  command: mdadm --create --verbose /dev/md1 --level=5 --raid-devices=3 /dev/sdc /dev/sdd /dev/sde
  args:
    creates: /dev/md1
  when: "'kafka_nodes' in group_names"

- name: Создание VG vg_kafka на RAID 5
  lvg:
    vg: vg_kafka
    pvs: /dev/md1
  when: "'kafka_nodes' in group_names"

- name: Создание Logical Volume для Kafka
  lvol:
    vg: vg_kafka
    lv: lv_kafka
    size: 100%FREE
  when: "'kafka_nodes' in group_names"

- name: Форматирование тома Kafka в XFS (Best practice for Kafka)
  filesystem:
    fstype: xfs
    dev: /dev/vg_kafka/lv_kafka
  when: "'kafka_nodes' in group_names"

- name: Создание точки монтирования Kafka
  file:
    path: /var/lib/kafka
    state: directory
  when: "'kafka_nodes' in group_names"

- name: Монтирование Kafka
  mount:
    path: /var/lib/kafka
    src: /dev/vg_kafka/lv_kafka
    fstype: xfs
    state: mounted
  when: "'kafka_nodes' in group_names"


# --- ОБЩИЕ ШАГИ ---
- name: Сохранение конфигурации RAID
  shell: mdadm --detail --scan >> /etc/mdadm/mdadm.conf
  args:
    creates: /etc/mdadm/mdadm.conf.saved
  notify: update initramfs

- name: Маркер сохранения config
  file:
    path: /etc/mdadm/mdadm.conf.saved
    state: touch

---
- name: Установка зависимостей хранилища
  apt:
    name: [lvm2, xfsprogs]
    state: present
    update_cache: yes

- name: Рескан SCSI шины для обнаружения новых дисков Azure
  shell: |
    for host in /sys/class/scsi_host/*; do echo "- - -" > $host/scan; done
  args:
    executable: /bin/bash
  changed_when: false

- name: Установка mdadm для RAID
  apt:
    name: mdadm
    state: present
  when: aegis_raid_devices | default([]) | length > 0

- name: Создание RAID 5 массива
  command: >-
    mdadm --create --verbose /dev/md0
      --level=5
      --raid-devices={{ aegis_raid_devices | length }}
      {{ aegis_raid_devices | join(' ') }}
      --run
  args:
    creates: /dev/md0
  when: aegis_raid_devices | default([]) | length >= 3
  notify: update initramfs

- name: Сохранение конфигурации RAID
  shell: mdadm --detail --scan >> /etc/mdadm/mdadm.conf
  args:
    executable: /bin/bash
  register: mdadm_scan
  changed_when: mdadm_scan.rc == 0
  when: aegis_raid_devices | default([]) | length >= 3
  # Не используем creates, так как мы хотим убедиться что запись там есть. 
  # В идеале использовать lineinfile или template, но mdadm --scan надежнее для генерации строки.

- name: Создание Volume Group на каждом выделенном диске
  community.general.lvg:
    vg: "vg_{{ item.name }}"
    pvs: "{{ item.dev }}"
  loop: "{{ aegis_data_devices | default([]) }}"
  loop_control:
    label: "{{ item.name }} → {{ item.dev }}"

- name: Создание Logical Volume (100%FREE)
  community.general.lvol:
    vg: "vg_{{ item.name }}"
    lv: "lv_{{ item.name }}"
    size: 100%FREE
  loop: "{{ aegis_data_devices | default([]) }}"
  loop_control:
    label: "lv_{{ item.name }}"
  ignore_errors: yes

- name: Форматирование тома в целевой ФС
  filesystem:
    fstype: "{{ item.fs }}"
    dev: "/dev/vg_{{ item.name }}/lv_{{ item.name }}"
  loop: "{{ aegis_data_devices | default([]) }}"
  loop_control:
    label: "{{ item.fs }} on lv_{{ item.name }}"

- name: Создание точки монтирования
  file:
    path: "{{ item.mount }}"
    state: directory
  loop: "{{ aegis_data_devices | default([]) }}"
  loop_control:
    label: "{{ item.mount }}"

- name: Монтирование (с записью в fstab)
  mount:
    path: "{{ item.mount }}"
    src: "/dev/vg_{{ item.name }}/lv_{{ item.name }}"
    fstype: "{{ item.fs }}"
    state: mounted
  loop: "{{ aegis_data_devices | default([]) }}"
  loop_control:
    label: "{{ item.mount }}"

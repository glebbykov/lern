---
# ---------------------------------------------------------------------------
# Storage layout — fully driven by per-host facts rendered by Terraform.
#
# Each host carries:
#   aegis_raid_devices: list of block devices to assemble into /dev/md0 (RAID 5)
#                       — empty list = no RAID
#   aegis_data_devices: list of {name, dev, fs, mount} entries describing
#                       the LVM groups/volumes to create on top of those devs
#
# Source of truth: ../inventory/host_vars/<host>.yml (generated by Terraform).
# ---------------------------------------------------------------------------

- name: Установка зависимостей хранилища
  apt:
    name: [lvm2, xfsprogs]
    state: present
    update_cache: yes

# --- Optional RAID 5 assembly (kafka node) ---
- name: Установка mdadm для RAID
  apt:
    name: mdadm
    state: present
  when: aegis_raid_devices | default([]) | length > 0

- name: Создание RAID 5 массива
  command: >-
    mdadm --create --verbose /dev/md0
      --level=5
      --raid-devices={{ aegis_raid_devices | length }}
      {{ aegis_raid_devices | join(' ') }}
      --run
  args:
    creates: /dev/md0
  when: aegis_raid_devices | default([]) | length >= 3

# --- LVM volumes per data device ---
- name: Создание Volume Group на каждом выделенном диске
  community.general.lvg:
    vg: "vg_{{ item.name }}"
    pvs: "{{ item.dev }}"
  loop: "{{ aegis_data_devices | default([]) }}"
  loop_control:
    label: "{{ item.name }} → {{ item.dev }}"

- name: Создание Logical Volume (100%FREE)
  community.general.lvol:
    vg: "vg_{{ item.name }}"
    lv: "lv_{{ item.name }}"
    size: 100%FREE
  loop: "{{ aegis_data_devices | default([]) }}"
  loop_control:
    label: "lv_{{ item.name }}"

- name: Форматирование тома в целевой ФС
  filesystem:
    fstype: "{{ item.fs }}"
    dev: "/dev/vg_{{ item.name }}/lv_{{ item.name }}"
  loop: "{{ aegis_data_devices | default([]) }}"
  loop_control:
    label: "{{ item.fs }} on lv_{{ item.name }}"

- name: Создание точки монтирования
  file:
    path: "{{ item.mount }}"
    state: directory
  loop: "{{ aegis_data_devices | default([]) }}"
  loop_control:
    label: "{{ item.mount }}"

- name: Монтирование (с записью в fstab)
  mount:
    path: "{{ item.mount }}"
    src: "/dev/vg_{{ item.name }}/lv_{{ item.name }}"
    fstype: "{{ item.fs }}"
    state: mounted
  loop: "{{ aegis_data_devices | default([]) }}"
  loop_control:
    label: "{{ item.mount }}"

---
# Зачем: Облачные образы не включают нужные ФС-утилиты по умолчанию.
# Почему так: LVM нужен для гибкой разметки, XFS - лучшая ФС для Mongo/Kafka (требование/рекомендация вендора).
- name: Установка зависимостей хранилища
  apt:
    name: [lvm2, xfsprogs]
    state: present
    update_cache: yes

# Зачем: В Azure диски могут прикрепляться на лету и не сразу появиться в ОС.
# Почему так: Форсированный рескан SCSI шины гарантирует, что Ansible увидит `/dev/sdX` перед созданием LVM/RAID.
- name: Рескан SCSI шины для обнаружения новых дисков Azure
  shell: |
    for host in /sys/class/scsi_host/*; do echo "- - -" > $host/scan; done
  args:
    executable: /bin/bash
  changed_when: false

- name: Резолв LUN в имена устройств (Azure)
  shell: |
    ls -l /dev/disk/by-path/*-scsi-0:0:0:{{ item.lun }} | awk '{print $NF}' | sed 's|../../|/dev/|'
  register: resolved_data_devs
  loop: "{{ aegis_data_devices | default([]) }}"
  loop_control:
    label: "Resolving {{ item.name }} (LUN: {{ item.lun | default('N/A') }})"
  when: item.lun is defined
  changed_when: false

- name: Резолв LUN для RAID (Azure)
  shell: |
    ls -l /dev/disk/by-path/*-scsi-0:0:0:{{ item }} | awk '{print $NF}' | sed 's|../../|/dev/|'
  register: resolved_raid_devs
  loop: "{{ aegis_raid_luns | default([]) }}"
  when: aegis_raid_luns | default([]) | length > 0
  changed_when: false

- name: Подготовка списков устройств
  set_fact:
    aegis_data_devices_final: >-
      {% set results = [] %}
      {% for item in resolved_data_devs.results | default([]) %}
        {% if not item.skipped | default(false) %}
          {% set _ = results.append(item.item | combine({'dev': item.stdout})) %}
        {% else %}
          {% set _ = results.append(item.item) %}
        {% endif %}
      {% endfor %}
      {{ results }}
    aegis_raid_devices_final: "{{ resolved_raid_devs.results | default([]) | map(attribute='stdout') | list }}"

# Зачем: Зависимость для создания software RAID (используется для бэкап-узла).
# Почему так: Устанавливается условно (только если есть список `aegis_raid_devices`), чтобы не засорять остальные узлы.
- name: Установка mdadm для RAID
  apt:
    name: mdadm
    state: present
  when: aegis_raid_devices_final | length > 0

# Зачем: Обеспечить отказоустойчивое хранилище (RAID 5) для архивов и бэкапов.
# Почему так: `creates: /dev/md0` обеспечивает идемпотентность (не пересоздает массив, если он уже есть).
- name: Создание RAID 5 массива
  command: >-
    mdadm --create --verbose /dev/md0
      --level=5
      --raid-devices={{ aegis_raid_devices_final | length }}
      {{ aegis_raid_devices_final | join(' ') }}
      --run
  args:
    creates: /dev/md0
  when: aegis_raid_devices_final | length >= 3
  notify: update initramfs

# Зачем: Ядро при загрузке должно знать, из каких дисков собирать RAID, чтобы примонтировать его.
# Почему так: UUID фиксирует массив, иначе изменение порядка дисков при ребуте развалит RAID.
- name: Сохранение конфигурации RAID
  shell: mdadm --detail --scan >> /etc/mdadm/mdadm.conf
  args:
    executable: /bin/bash
  register: mdadm_scan
  changed_when: mdadm_scan.rc == 0
  when: aegis_raid_devices_final | length >= 3
  # Не используем creates, так как мы хотим убедиться что запись там есть. 
  # В идеале использовать lineinfile или template, но mdadm --scan надежнее для генерации строки.

# Зачем: Изолировать I/O для каждой базы данных (PostgreSQL, Mongo, Redis).
# Почему так: LVM дает возможность онлайн-расширения (`vgextend`, `lvextend`) и создания снапшотов.
- name: Создание Volume Group на каждом выделенном диске
  community.general.lvg:
    vg: "vg_{{ item.name }}"
    pvs: "{{ item.dev }}"
  loop: "{{ aegis_data_devices_final | selectattr('dev', 'defined') | list }}"
  loop_control:
    label: "{{ item.name }} → {{ item.dev }}"

# Зачем: Утилизировать 100% выделенного диска под конкретную базу данных.
# Почему так: `ignore_errors: yes` подавляет баг модуля `lvol`, который иногда падает при попытке расширить уже полный том.
- name: Создание Logical Volume (100%FREE)
  community.general.lvol:
    vg: "vg_{{ item.name }}"
    lv: "lv_{{ item.name }}"
    size: 100%FREE
  loop: "{{ aegis_data_devices_final | selectattr('dev', 'defined') | list }}"
  loop_control:
    label: "lv_{{ item.name }}"
  ignore_errors: yes

# Зачем: Подготовить логические тома к записи данных.
# Почему так: Тип ФС (ext4/xfs) задается динамически через host_vars в зависимости от профиля I/O базы.
- name: Форматирование тома в целевой ФС
  filesystem:
    fstype: "{{ item.fs }}"
    dev: "/dev/vg_{{ item.name }}/lv_{{ item.name }}"
  loop: "{{ aegis_data_devices_final | selectattr('dev', 'defined') | list }}"
  loop_control:
    label: "{{ item.fs }} on lv_{{ item.name }}"

# Зачем: Точка монтирования должна существовать до вызова `mount`, иначе он упадет.
# Почему так: Вынесено в отдельный task для надежности.
- name: Создание точки монтирования
  file:
    path: "{{ item.mount }}"
    state: directory
  loop: "{{ aegis_data_devices_final | selectattr('dev', 'defined') | list }}"
  loop_control:
    label: "{{ item.mount }}"

# Зачем: Подключить диски к файловой системе ОС.
# Почему так: `state: mounted` не только монтирует сейчас, но и прописывает в `/etc/fstab` для авто-монтирования при загрузке.
- name: Монтирование (с записью в fstab)
  mount:
    path: "{{ item.mount }}"
    src: "/dev/vg_{{ item.name }}/lv_{{ item.name }}"
    fstype: "{{ item.fs }}"
    state: mounted
  loop: "{{ aegis_data_devices_final | selectattr('dev', 'defined') | list }}"
  loop_control:
    label: "{{ item.mount }}"


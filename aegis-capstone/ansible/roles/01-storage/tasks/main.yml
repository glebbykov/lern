---
- name: Установка зависимостей хранилища
  apt:
    name: [lvm2, xfsprogs, mdadm]
    state: present
    update_cache: yes

# --- DB NODE (Dedicated Physical Disks for I/O Isolation) ---
- name: Создание Volume Groups для каждой БД на ВЫДЕЛЕННЫХ физических дисках
  lvg:
    vg: "{{ item.vg }}"
    pvs: "{{ item.pv }}"
  loop:
    - { vg: 'vg_pgsql', pv: '/dev/sdc' }
    - { vg: 'vg_mongo', pv: '/dev/sdd' }
    - { vg: 'vg_redis', pv: '/dev/sde' }
    - { vg: 'vg_etcd',  pv: '/dev/sdf' }
  when: "'db_nodes' in group_names"

- name: Создание Logical Volumes для каждой БД
  lvol:
    vg: "{{ item.vg }}"
    lv: "{{ item.lv }}"
    size: "100%FREE"
  loop:
    - { vg: 'vg_pgsql', lv: 'lv_pgsql' }
    - { vg: 'vg_mongo', lv: 'lv_mongo' }
    - { vg: 'vg_redis', lv: 'lv_redis' }
    - { vg: 'vg_etcd',  lv: 'lv_etcd' }
  when: "'db_nodes' in group_names"

- name: Форматирование томов в ext4
  filesystem:
    fstype: ext4
    dev: "/dev/{{ item.vg }}/{{ item.lv }}"
  loop:
    - { vg: 'vg_pgsql', lv: 'lv_pgsql' }
    - { vg: 'vg_redis', lv: 'lv_redis' }
    - { vg: 'vg_etcd',  lv: 'lv_etcd' }
  when: "'db_nodes' in group_names"

- name: Форматирование тома MongoDB в XFS (Best practice for WiredTiger)
  filesystem:
    fstype: xfs
    dev: "/dev/vg_mongo/lv_mongo"
  when: "'db_nodes' in group_names"

- name: Точки монтирования DB
  file:
    path: "/var/lib/{{ item }}"
    state: directory
  loop: [etcd, redis, postgresql, mongodb]
  when: "'db_nodes' in group_names"

- name: Монтирование DB (ext4)
  mount:
    path: "/var/lib/{{ item.name }}"
    src: "/dev/{{ item.vg }}/lv_{{ item.name }}"
    fstype: ext4
    state: mounted
  loop:
    - { name: 'etcd', vg: 'vg_etcd' }
    - { name: 'redis', vg: 'vg_redis' }
    - { name: 'postgresql', vg: 'vg_pgsql' }
  when: "'db_nodes' in group_names"

- name: Монтирование MongoDB (xfs)
  mount:
    path: "/var/lib/mongodb"
    src: "/dev/vg_mongo/lv_mongo"
    fstype: xfs
    state: mounted
  when: "'db_nodes' in group_names"


# --- KAFKA NODE (RAID 5) ---
- name: Создание RAID 5 (kafka) /dev/sdc, /dev/sdd, /dev/sde на kafka-node
  command: mdadm --create --verbose /dev/md1 --level=5 --raid-devices=3 /dev/sdc /dev/sdd /dev/sde
  args:
    creates: /dev/md1
  when: "'kafka_nodes' in group_names"

- name: Сохранение конфигурации RAID
  shell: mdadm --detail --scan >> /etc/mdadm/mdadm.conf
  args:
    creates: /etc/mdadm/mdadm.conf.saved
  notify: update initramfs
  when: "'kafka_nodes' in group_names"

- name: Маркер сохранения config
  file:
    path: /etc/mdadm/mdadm.conf.saved
    state: touch
  when: "'kafka_nodes' in group_names"

- name: Создание VG vg_kafka на RAID 5
  lvg:
    vg: vg_kafka
    pvs: /dev/md1
  when: "'kafka_nodes' in group_names"

- name: Создание Logical Volume для Kafka
  lvol:
    vg: vg_kafka
    lv: lv_kafka
    size: 100%FREE
  when: "'kafka_nodes' in group_names"

- name: Форматирование тома Kafka в XFS (Best practice for Kafka)
  filesystem:
    fstype: xfs
    dev: /dev/vg_kafka/lv_kafka
  when: "'kafka_nodes' in group_names"

- name: Создание точки монтирования Kafka
  file:
    path: /var/lib/kafka
    state: directory
  when: "'kafka_nodes' in group_names"

- name: Монтирование Kafka
  mount:
    path: /var/lib/kafka
    src: /dev/vg_kafka/lv_kafka
    fstype: xfs
    state: mounted
  when: "'kafka_nodes' in group_names"

---
# Зачем: Установить ядро и утилиты для создания VPN.
# Почему так: WireGuard работает на уровне ядра (быстро) и не требует сложных PKI как OpenVPN.
# Зачем: Место для хранения ключей и конфигов WG.
# Почему так: mode '0700' критичен для безопасности приватных ключей.
- name: Убедиться, что директория WireGuard существует
  file:
    path: /etc/wireguard
    state: directory
    mode: '0700'

# Зачем: Не перегенерировать ключи при каждом запуске Ansible.
# Почему так: Смена ключей порвет существующие туннели и потребует обновления конфигов на всех пирах.
- name: Проверка наличия приватного ключа
  stat:
    path: /etc/wireguard/privatekey
  register: wg_priv_stat

# Зачем: Создать криптографические ключи узла.
# Почему так: pipefail гарантирует, что мы не сохраним пустой файл, если wg genkey упадет.
- name: Генерация ключей WireGuard
  shell: |
    set -o pipefail
    umask 077
    wg genkey | tee /etc/wireguard/privatekey | wg pubkey > /etc/wireguard/publickey
  args:
    executable: /bin/bash
  when: not wg_priv_stat.stat.exists

# Зачем: Загрузить приватный ключ в память Ansible для рендеринга конфига.
# Почему так: Используем slurp (base64) вместо command cat для надежного чтения без лишних пробелов.
- name: Чтение приватного ключа
  slurp:
    src: /etc/wireguard/privatekey
  register: wg_priv_raw

# Зачем: Загрузить публичный ключ в память (потребуется другим узлам).
# Почему так: То же самое, используем slurp.
- name: Чтение публичного ключа
  slurp:
    src: /etc/wireguard/publickey
  register: wg_pub_raw

# Зачем: Сохранить ключи и вычислить IP узла в оверлейной сети.
# Почему так: Индекс в группе `azure_nodes` гарантирует, что каждый узел получит уникальный детерминированный IP (10.100.0.10, .11 и т.д.).
- name: Установка фактов WireGuard для текущего узла
  set_fact:
    wg_private_key: "{{ wg_priv_raw['content'] | b64decode | trim }}"
    wg_public_key: "{{ wg_pub_raw['content'] | b64decode | trim }}"
    # Генерируем IP на основе индекса узла в группе azure_nodes (от 10 до 255)
    wg_overlay_ip: "10.100.0.{{ groups['azure_nodes'].index(inventory_hostname) + 10 }}"

# Зачем: Создать конфигурацию wg0 со всеми пирами (Mesh-топология).
# Почему так: Шаблон j2 перебирает hostvars всех других узлов (поэтому нам важен сбор фактов со всех).
- name: Генерация конфигурации wg0.conf
  template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    mode: '0600'
  notify: Restart WireGuard

# Зачем: Поднять туннель и обеспечить его автоматический запуск после ребута.
# Почему так: wg-quick - стандартный systemd wrapper над утилитой wg, автоматически настраивающий маршруты.
- name: Включение и запуск интерфейса wg0
  systemd:
    name: wg-quick@wg0
    state: started
    enabled: yes

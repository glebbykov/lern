---
# Зачем: Запускать приложение не от root.
# Почему так: Снижает risk profile (privilege escalation) в случае взлома веб-приложения.
- name: Создание системного пользователя aegis-svc
  user:
    name: aegis-svc
    system: yes
    shell: /usr/sbin/nologin
    create_home: no

# Зачем: Подготовить место для деплоя кода (рабочая директория).
# Почему так: /opt используется для непакетированного софта сторонних разработчиков (наше приложение).
- name: Создание директории для приложения
  file:
    path: /opt/aegis-app
    state: directory
    owner: aegis-svc
    group: aegis-svc

# Зачем: Разместить исходный код заглушки (прототипа) приложения.
# Почему так: Пока нет CI/CD pipeline, деплоим простой python-скрипт прямо через Ansible.
- name: Деплой кода приложения
  copy:
    dest: /opt/aegis-app/app.py
    content: |
      import http.server
      import socketserver
      PORT = 8080
      Handler = http.server.SimpleHTTPRequestHandler
      with socketserver.TCPServer(("", PORT), Handler) as httpd:
          print("Aegis Secure App serving at port", PORT)
          httpd.serve_forever()
    owner: aegis-svc
    group: aegis-svc

# Зачем: Управлять жизненным циклом приложения и жестко ограничить его возможности (sandbox).
# Почему так: Systemd обладает мощными встроенными механизмами sandboxing'а (ProtectSystem, SystemCallFilter), делающими контейнеры необязательными для простых сервисов.
- name: Создание systemd сервиса с Харденингом (Песочница)
  copy:
    dest: /etc/systemd/system/aegis-app.service
    content: |
      [Unit]
      Description=Aegis Sandbox App
      After=network.target

      [Service]
      ExecStart=/usr/bin/python3 /opt/aegis-app/app.py
      WorkingDirectory=/opt/aegis-app
      User=aegis-svc
      Group=aegis-svc

      # Sandboxing
      NoNewPrivileges=yes
      ProtectSystem=strict
      ProtectHome=yes
      PrivateTmp=yes
      SystemCallFilter=~@mount @clock @raw-io
      ReadOnlyPaths=/

      Restart=on-failure

      [Install]
      WantedBy=multi-user.target
  notify: restart aegis-app

# Зачем: Ввести сервис в строй.
# Почему так: daemon_reload нужен, так как мы только что создали новый unit-файл.
- name: Запуск и включение aegis-app сервиса
  systemd:
    name: aegis-app
    state: started
    enabled: yes
    daemon_reload: yes

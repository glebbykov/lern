---
# Зачем: Подтвердить подлинность пакетов Docker/Containerd при скачивании.
# Почему так: Стандартная практика apt для добавления сторонних репозиториев.
- name: Добавление ключа Docker/Containerd
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

# Зачем: Скачать свежую стабильную версию Containerd, которой может не быть в стандартном репо Ubuntu.
# Почему так: Используется официальный репозиторий Docker.
- name: Добавление репозитория Docker/Containerd
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

# Зачем: Базовый runtime для запуска контейнеров будущего Kubernetes и изолированных сервисов (App Sandbox).
# Почему так: Устанавливаем и containerd (для K8s), и Docker Engine (для локальной разработки и docker-compose).
- name: Установка Docker и Containerd
  apt:
    name:
      - containerd.io
      - docker-ce
      - docker-ce-cli
      - docker-compose-plugin
    state: present
    update_cache: yes

# Зачем: Сгенерировать полный конфиг со всеми параметрами, чтобы потом изменить нужный.
# Почему так: `changed_when: false` не портит статистику Ansible (это read-only операция).
- name: Генерация дефолтного конфига containerd
  command: containerd config default
  register: containerd_config
  changed_when: false

# Зачем: Сохранить сгенерированный шаблон в файл настроек.
# Почему так: Перезаписывает дефолтный пустой или старый конфиг.
- name: Сохранение конфига containerd
  copy:
    dest: /etc/containerd/config.toml
    content: "{{ containerd_config.stdout }}"

# Зачем: Требование Kubernetes (kubelet) — оба компонента (systemd и containerd) должны использовать один и тот же cgroup manager.
# Почему так: Иначе возникнут утечки ресурсов и нестабильность контейнеров из-за двух разных контроллеров cgroup.
- name: Включение SystemdCgroup в конфиге containerd
  replace:
    path: /etc/containerd/config.toml
    regexp: 'SystemdCgroup = false'
    replace: 'SystemdCgroup = true'
  notify: restart containerd

# Зачем: Дать ansible_user работать с Docker без sudo.
# Почему так: Группа docker даёт доступ к /var/run/docker.sock; без неё каждая команда требует sudo и docker compose неудобно использовать.
# Эффект применяется при следующей SSH-сессии (или после reset_connection).
- name: Добавление ansible_user в группу docker
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes

# Зачем: Сбросить SSH-соединение, чтобы новая группа применилась без re-login.
# Почему так: Membership в группе кэшируется на сессию; meta reset_connection заставляет Ansible переподключиться при следующей задаче.
- name: Сброс SSH-сессии для применения новой группы
  meta: reset_connection
